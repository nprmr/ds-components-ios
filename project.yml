name: DSComponentsPreview
options:
  bundleIdPrefix: com.ds.preview
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  DSComponentsPreview:
    type: application
    platform: iOS
    sources:
      - path: DSComponentsPreview
        type: group
      - path: Components
        type: group
      - path: Core
        type: group
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.ds.preview.app
